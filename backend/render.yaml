services:
  - type: web
    name: sentiment-backend
    runtime: docker
    plan: free # Note: TensorFlow may require 'starter' ($7/mo) for RAM
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sentiment-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256

databases:
  - name: sentiment-db
    databaseName: sentiment
    user: postgres
    plan: free